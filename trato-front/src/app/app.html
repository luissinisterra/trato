<div class="app-shell">
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark">
        <span class="mark-dot"></span>
      </div>
      <div class="brand-text">
        <span class="brand-title">Trato</span>
        <span class="brand-sub">Marketplace de subastas</span>
      </div>
    </div>

    <nav class="app-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
      <a routerLink="/explore" routerLinkActive="active">Explorar</a>
      <a routerLink="/bids" routerLinkActive="active">Pujar</a>
      <a routerLink="/profile" routerLinkActive="active">Perfil</a>
    </nav>

    <div class="app-actions">
      @if (user()) {
        <a class="btn primary" routerLink="/create-auction">Nueva Subasta</a>
        <div class="user-pill">
          <span>{{ user()?.email }}</span>
        </div>
        <button class="btn ghost" type="button" (click)="onLogout()">Cerrar sesion</button>
      } @else {
        <a class="btn ghost" routerLink="/login">Iniciar sesion</a>
      }
    </div>
  </header>

  <main class="app-main">
    <router-outlet />
  </main>

  <nav class="bottom-nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <span>Inicio</span>
    </a>
    <a routerLink="/explore" routerLinkActive="active">
      <span>Explorar</span>
    </a>
    <a routerLink="/bids" routerLinkActive="active">
      <span>Pujar</span>
    </a>
    <a routerLink="/wallet" routerLinkActive="active">
      <span>Pagos</span>
    </a>
    <a routerLink="/profile" routerLinkActive="active">
      <span>Perfil</span>
    </a>
  </nav>
</div>
