services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_advisor_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_service_db
    ports:
      - "5437:5432"
    volumes:
      - agent_postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-agent:
    build: .
    container_name: ai_auction_advisor
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3009
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-google/gemini-2.0-flash}
      TRATO_GATEWAY_URL: http://gateway_service:3000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/agent_service_db
    ports:
      - "3009:3009"

volumes:
  agent_postgres_data:
