<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente RRHH</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <div class="avatar">🤖</div>
            <div class="header-info">
                <h1>Asistente RRHH</h1>
                <p>En línea</p>
            </div>
        </header>

        <div class="chat-messages" id="chat-messages">
            <div class="message bot">
                <div class="bubble">
                    Hola, soy el asistente experto de Recursos Humanos. Puedes preguntarme el sueldo de un empleado por ID (ej. EMP001, EMP002, EMP003) y su sueldo neto tras impuestos.
                </div>
            </div>
        </div>

        <form class="chat-input" id="chat-form">
            <input type="text" id="user-input" placeholder="Escribe tu mensaje aquí..." autocomplete="off" required>
            <button type="submit">Enviar</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
