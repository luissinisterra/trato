version: "3.9"
services:
  auctions-db:
    image: postgres:15
    container_name: auctions_service_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: auctions_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - auctions_db_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auctions-service:
    build: .
    container_name: auctions_service_api
    restart: unless-stopped
    depends_on:
      auctions-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://auctions-db:5432/auctions_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

volumes:
  auctions_db_data:
