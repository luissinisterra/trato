services:
  gateway-service:
    build: .
    container_name: gateway_service
    restart: unless-stopped
    environment:
      PORT: ${PORT:-3000}
      AUTH_SERVICE_URL: http://auth_service_api:3000
      USER_SERVICE_URL: http://user-service:3002
      AUCTION_SERVICE_URL: http://auctions_service:3003
      PRODUCT_SERVICE_URL: http://product_service:3004
      BID_SERVICE_URL: http://bid_service:3000
      PAYMENT_SERVICE_URL: http://payment_service:3006
      REPORT_SERVICE_URL: http://report_service:3007
      NOTIFICATION_SERVICE_URL: http://notification-service:3008
      AI_AGENT_SERVICE_URL: http://ai-agent:3009
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:4200}
    ports:
      - '3000:3000'
    depends_on:
      - auth-service
      - user-service
      - auctions-service
      - bid-service
      - payment-service
      - report-service
      - product-service
      - notification-service
      - ai-agent

  auth-service:
    build: ../auth-service
    container_name: auth_service_api
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: auth_db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-auth_service_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-access-secret-dev}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-refresh-secret-dev}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      WORKER_URL: http://notification-service:3008
      NOTIFY_SECRET: ${NOTIFY_SECRET:-notify-secret-dev}
    ports:
      - '3001:3000'
    depends_on:
      auth_db:
        condition: service_healthy

  auth_db:
    image: postgres:16-alpine
    container_name: auth_service_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-auth_service_db}
    ports:
      - '5435:5432'
    volumes:
      - auth_postgres_data:/var/lib/postgresql/data
      - ../auth-service/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  auctions-service:
    build: ../auctions-service
    container_name: auctions_service
    restart: unless-stopped
    environment:
      PORT: 3003
      SPRING_DATASOURCE_URL: jdbc:postgresql://auctions_db:5432/auctions_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-postgres}
      WORKER_URL: https://trato-notifications.luchoporst.workers.dev
      NOTIFY_SECRET: ${NOTIFY_SECRET:-notify-secret-dev}
    ports:
      - '3003:3003'
    depends_on:
      auctions_db:
        condition: service_healthy

  auctions_db:
    image: postgres:16-alpine
    container_name: auctions_service_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: auctions_db
    ports:
      - '5434:5432'
    volumes:
      - auctions_postgres_data:/var/lib/postgresql/data
      - ../auctions-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  bid-service:
    build: ../bid-service
    container_name: bid_service
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: bid_db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-bid_service_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      WORKER_URL: http://notification-service:3008
      NOTIFY_SECRET: ${NOTIFY_SECRET:-notify-secret-dev}
    ports:
      - '3005:3000'
    depends_on:
      bid_db:
        condition: service_healthy

  bid_db:
    image: postgres:16-alpine
    container_name: bid_service_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-bid_service_db}
    ports:
      - '5433:5432'
    volumes:
      - bid_postgres_data:/var/lib/postgresql/data
      - ../bid-service/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ../user-service
    container_name: user_service
    restart: unless-stopped
    environment:
      PORT: 3002
      DB_HOST: user_db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-user_service_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '3002:3002'
    depends_on:
      user_db:
        condition: service_healthy

  user_db:
    image: postgres:16-alpine
    container_name: user_service_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-user_service_db}
    ports:
      - '5438:5432'
    volumes:
      - user_postgres_data:/var/lib/postgresql/data
      - ../user-service/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  payment-service:
    build: ../payment-service
    container_name: payment_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3006
      DB_HOST: payment_db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: payment_db
      AUCTIONS_SERVICE_URL: http://auctions_service:3003
    ports:
      - '3006:3006'
    depends_on:
      payment_db:
        condition: service_healthy

  payment_db:
    image: postgres:16-alpine
    container_name: payment_service_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    ports:
      - '5439:5432'
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
      - ../payment-service/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  report-service:
    build: ../report-service
    container_name: report_service
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3007
      DB_HOST: report_db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: report_db
      AUCTIONS_SERVICE_URL: http://auctions_service:3003
      BID_SERVICE_URL: http://bid_service:3000
      USER_SERVICE_URL: http://user-service:3002
    ports:
      - '3007:3007'
    depends_on:
      report_db:
        condition: service_healthy

  report_db:
    image: postgres:16-alpine
    container_name: report_service_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: report_db
    ports:
      - '5440:5432'
    volumes:
      - report_postgres_data:/var/lib/postgresql/data
      - ../report-service/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  product-service:
    build: ../product-service
    container_name: product_service
    restart: unless-stopped
    environment:
      PORT: 3004
      DB_HOST: product_db
      DB_PORT: 5432
      DB_NAME: product_service_db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '3004:3004'
    depends_on:
      product_db:
        condition: service_healthy

  product_db:
    image: postgres:16-alpine
    container_name: product_service_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: product_service_db
    ports:
      - '5436:5432'
    volumes:
      - product_postgres_data:/var/lib/postgresql/data
      - ../product-service/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  notification-service:
    build: ../notification-service
    container_name: notification_service
    restart: unless-stopped
    environment:
      PORT: 3008
      MONGODB_URI: mongodb://notification_db:27017/trato_notifications
      RABBITMQ_URL: amqp://rabbitmq:5672
      RABBITMQ_QUEUE: notification_events
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-in-production}
      AUTH_SERVICE_URL: http://auth_service_api:3000
      CLOUDFLARE_WORKER_URL: ${CLOUDFLARE_WORKER_URL:-https://trato-notifications.luchoporst.workers.dev}
      CLOUDFLARE_NOTIFY_SECRET: ${CLOUDFLARE_NOTIFY_SECRET:-notify-secret-dev}
      NOTIFY_SECRET: ${NOTIFY_SECRET:-notify-secret-dev}
    ports:
      - '3008:3008'
    depends_on:
      notification_db:
        condition: service_started
      rabbitmq:
        condition: service_started

  notification_db:
    image: mongo:7
    container_name: notification_service_db
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - notification_mongo_data:/data/db

  ai-agent:
    build: ../../agent/ai-auction-advisor
    container_name: ai_auction_advisor
    restart: unless-stopped
    environment:
      PORT: 3009
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-google/gemini-2.0-flash}
      TRATO_GATEWAY_URL: http://gateway-service:3000
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@agent_db:5432/agent_service_db
    ports:
      - '3009:3009'
    depends_on:
      agent_db:
        condition: service_healthy

  agent_db:
    image: postgres:16-alpine
    container_name: agent_advisor_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_service_db
    ports:
      - '5437:5432'
    volumes:
      - agent_postgres_data:/var/lib/postgresql/data
      - ../../agent/ai-auction-advisor/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_service
    restart: unless-stopped
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}

volumes:
  auth_postgres_data:
  auctions_postgres_data:
  bid_postgres_data:
  product_postgres_data:
  notification_mongo_data:
  agent_postgres_data:
  user_postgres_data:
  payment_postgres_data:
  report_postgres_data:
