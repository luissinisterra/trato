spring.application.name=auctions-service
server.port=${PORT:3003}

# ── PostgreSQL ────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auctions_service_db}?stringtype=unspecified&sslmode=${DB_SSL_MODE:require}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────
# validate: Hibernate checks the schema matches entities but does NOT modify it.
# The schema is managed entirely by migrations/init.sql via Docker Compose.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── Notifications (Cloudflare Worker) ────────────────────────────────────
WORKER_URL=${WORKER_URL:https://trato-notifications.luchoporst.workers.dev}
NOTIFY_SECRET=${NOTIFY_SECRET:}

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.trato=INFO
